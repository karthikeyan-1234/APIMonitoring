apiVersion: apps/v1
kind: Deployment
metadata:
  name: api1-green
  labels:
    app: api1-app
    slot: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api1-app
      slot: green
  template:
    metadata:
      labels:
        app: api1-app
        slot: green
    spec:
      nodeName: desktop-control-plane
      containers:
        - name: api1-app
          image: api1-app:green
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: APP_VERSION
              value: "v2-green"
            - name: DEPLOYMENT_SLOT
              value: "green"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet: { path: /test, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /test, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api1-green-service
spec:
  type: ClusterIP
  selector:
    app: api1-app
    slot: green
  ports:
    - port: 80
      targetPort: 80
      name: http