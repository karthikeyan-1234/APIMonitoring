# ------------------------------------------------------------
# Deployment for the api1-app (stable)
# ------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api1-stable
  labels:
    app: api1-app
    version: stable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api1-app
      version: stable
  template:
    metadata:
      labels:
        app: api1-app
        version: stable
    spec:
      containers:
        - name: api1-app
          image: api1-app:stable        # <- matches your docker build tag
          imagePullPolicy: Always # <- use local image
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:80"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: APP_VERSION
              value: "v1-stable"
            # --- OTel resource attributes (these become Prometheus labels) ---
            - name: OTEL_SERVICE_NAME
              value: "API1"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.version=v1-stable,service.name=API1"
            # -----------------------------------------------------------------
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /test
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /test
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# ------------------------------------------------------------
# Service to expose the app internally
# ------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: api1-stable-service
spec:
  type: ClusterIP
  selector:
    app: api1-app
    version: stable
  ports:
    - port: 80
      targetPort: 80
      name: http
