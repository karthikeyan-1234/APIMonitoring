apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:

      # Enriches every metric with k8s metadata (pod name, deployment name, namespace, etc.)
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
        pod_association:
          - sources:
            - from: connection

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        # Converts ALL OTel resource attributes (service.version, service.name, etc.)
        # into Prometheus labels automatically. No transform processor needed.
        resource_to_telemetry_conversion:
          enabled: true

      debug: {}

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch, k8sattributes]
          exporters: [prometheus]

        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]